<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Message</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 15px;
    }

    p {
      color: #d0d0d0;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #00c8ff;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    a:hover {
      background: #00a6d1;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Nous sommes désolés</h1>

    <p>
      Red n’a pas encore ouvert ce site.<br><br>
      Le site sera ouvert très bientôt.
    </p>

    <a href="index.html">Retour au site</a>
  </div>

</body>
</html>
